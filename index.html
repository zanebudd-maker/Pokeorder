<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéOrder | Tracker Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --bg-main: #0b0f1a;
            --card-bg: #161e2d;
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #e2e8f0;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(22, 30, 45, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-style {
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            appearance: none;
        }

        .input-style:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .stat-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .payment-toggle {
            display: flex;
            background: #1f2937;
            padding: 4px;
            border-radius: 12px;
        }
        
        .payment-toggle button {
            flex: 1;
            padding: 10px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .payment-toggle .active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .image-preview-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            background: #1f2937;
        }

        .suggestions-list {
            position: absolute;
            z-index: 100;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 12px;
            margin-top: 4px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .suggestion-item {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #374151; color: #818cf8; }

        .edit-inline-card {
            border: 2px solid var(--accent) !important;
            background: rgba(99, 102, 241, 0.05);
            animation: expand 0.2s ease-out;
        }

        .countdown-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        @keyframes expand {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .shimmer {
            background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="p-3 md:p-8 pb-20">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white italic">
                        POKÉ<span class="text-indigo-500">ORDER</span><span class="text-[10px] bg-indigo-500 text-white px-2 py-0.5 rounded ml-2 not-italic align-middle">AI</span>
                    </h1>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Enhanced Collector Dashboard</p>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 w-full md:w-auto">
                    <div class="stat-card p-3 rounded-2xl min-w-[100px]">
                        <span class="block text-[9px] uppercase tracking-widest text-slate-500 mb-1">Portfolio</span>
                        <span id="stat-total-val" class="text-lg font-bold text-white">$0.00</span>
                    </div>
                    <div class="stat-card p-3 rounded-2xl min-w-[100px]">
                        <span class="block text-[9px] uppercase tracking-widest text-slate-500 mb-1">Paid</span>
                        <span id="stat-paid" class="text-lg font-bold text-emerald-400">$0.00</span>
                    </div>
                    <div class="stat-card p-3 rounded-2xl min-w-[100px]">
                        <span class="block text-[9px] uppercase tracking-widest text-indigo-400 mb-1">Owed</span>
                        <span id="stat-balance" class="text-lg font-bold text-indigo-400">$0.00</span>
                    </div>
                    <button onclick="generatePortfolioInsights()" class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl p-3 flex flex-col items-center justify-center transition-all group">
                        <span class="text-[9px] uppercase font-bold tracking-widest opacity-80 group-hover:opacity-100">Market Insights</span>
                        <span class="text-xs font-bold">✨ Analyze</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            <!-- Sidebar: Add Form -->
            <div class="lg:col-span-4 order-2 lg:order-1">
                <div id="form-container" class="glass-panel p-5 rounded-3xl sticky top-8">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="text-lg font-bold text-white">New Pre-Order</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div class="col-span-2 relative">
                                <div class="flex justify-between items-end mb-1">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase ml-1">Product Set</label>
                                    <button onclick="getSetAdvice('setName')" class="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 transition-colors">✨ Set Advice</button>
                                </div>
                                <input type="text" id="setName" oninput="handleInput('setName')" placeholder="e.g. Silver Tempest" class="w-full input-style p-3 rounded-xl text-sm" autocomplete="off">
                                <div id="setName-suggestions" class="suggestions-list hidden no-scrollbar"></div>
                            </div>
                            
                            <div class="col-span-2 relative">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Item Name</label>
                                <input type="text" id="itemName" oninput="handleInput('itemName')" placeholder="e.g. Booster Box" class="w-full input-style p-3 rounded-xl text-sm" autocomplete="off">
                                <div id="itemName-suggestions" class="suggestions-list hidden no-scrollbar"></div>
                            </div>

                            <div class="col-span-1 relative">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Merchant</label>
                                <input type="text" id="merchant" oninput="handleInput('merchant')" placeholder="Store" class="w-full input-style p-3 rounded-xl text-sm" autocomplete="off">
                                <div id="merchant-suggestions" class="suggestions-list hidden no-scrollbar"></div>
                            </div>

                            <div class="col-span-1">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Release Date</label>
                                <input type="date" id="launchDate" class="w-full input-style p-3 rounded-xl text-sm">
                            </div>

                            <div class="col-span-2">
                                <div class="payment-toggle">
                                    <button id="pay-type-deposit" onclick="setPaymentType('deposit')" class="active">Deposit</button>
                                    <button id="pay-type-full" onclick="setPaymentType('full')">Paid Full</button>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Unit Price ($)</label>
                                <input type="number" step="0.01" id="totalPrice" oninput="handlePriceSync()" placeholder="0.00" class="w-full input-style p-3 rounded-xl text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Quantity</label>
                                <input type="number" id="itemQty" value="1" min="1" oninput="handlePriceSync()" class="w-full input-style p-3 rounded-xl text-sm">
                            </div>
                            
                            <div class="col-span-2">
                                <label id="depositLabel" class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Total Paid Already ($)</label>
                                <input type="number" step="0.01" id="deposit" placeholder="0.00" class="w-full input-style p-3 rounded-xl text-sm">
                            </div>

                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">Item Image</label>
                                <input type="file" id="itemImage" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-600/20 file:text-indigo-400">
                            </div>
                        </div>

                        <button id="submit-btn" onclick="handleSubmit()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                            Track Order
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main Area -->
            <div class="lg:col-span-8 order-1 lg:order-2">
                <div class="flex flex-col sm:flex-row justify-between items-center border-b border-slate-800 mb-6 gap-4">
                    <div class="flex gap-6 px-2 overflow-x-auto no-scrollbar">
                        <button onclick="switchTab('active')" id="tab-btn-active" class="pb-3 text-sm font-bold uppercase tracking-widest whitespace-nowrap border-b-2 border-indigo-500 text-white">
                            Upcoming <span id="count-active" class="ml-1 opacity-40">0</span>
                        </button>
                        <button onclick="switchTab('archive')" id="tab-btn-archive" class="pb-3 text-sm font-bold uppercase tracking-widest whitespace-nowrap text-slate-500">
                            Collected <span id="count-archive" class="ml-1 opacity-40">0</span>
                        </button>
                    </div>
                    <div class="flex items-center gap-2 pb-3 px-2">
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Sorted by:</span>
                        <span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest bg-indigo-500/10 px-2 py-1 rounded-lg border border-indigo-500/20">📅 Release Date</span>
                    </div>
                </div>

                <div id="tab-content">
                    <div id="orderList" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Insight Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center z-[300] p-6">
        <div class="glass-panel p-6 md:p-8 rounded-3xl max-w-2xl w-full border border-indigo-500/30">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    ✨ Gemini Collector Insights
                </h3>
                <button onclick="closeAIModal()" class="text-slate-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="ai-content" class="text-slate-300 text-sm leading-relaxed max-h-[60vh] overflow-y-auto pr-2 no-scrollbar"></div>
            <div class="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center">
                <span class="text-[10px] text-slate-500 italic">Powered by Gemini 2.5 Flash</span>
                <button onclick="closeAIModal()" class="bg-slate-800 px-6 py-2 rounded-xl text-sm font-bold text-white">Close</button>
            </div>
        </div>
    </div>

    <!-- Duplicate Dialog -->
    <div id="duplicate-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center z-[200] p-6">
        <div class="glass-panel p-8 rounded-3xl max-w-sm w-full border border-indigo-500/30 text-center">
            <h3 class="text-xl font-bold text-white mb-2">Item Exists</h3>
            <p class="text-slate-400 text-sm mb-6">Found an existing tracker for this item. Merge them?</p>
            <div class="flex flex-col gap-3">
                <button id="btn-merge" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-white">Add to Quantity</button>
                <button id="btn-cancel-merge" class="w-full bg-slate-800 py-4 rounded-2xl font-bold text-slate-400">Add Separately</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let orders = JSON.parse(localStorage.getItem('pokeTracker_v2')) || [];
        let currentTab = 'active';
        let currentPaymentType = 'deposit';
        let editingId = null;
        let pendingOrder = null;

        // --- Helper: Date diff ---
        function getDaysUntil(dateString) {
            if (!dateString) return null;
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(dateString);
            const diff = target - today;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        // --- AI Features ---
        async function callGemini(prompt, systemPrompt = "You are a helpful Pokémon TCG collection expert.") {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response from AI.";
            } catch (error) {
                return "Failed to connect to Gemini.";
            }
        }

        async function getSetAdvice(inputId) {
            const setName = document.getElementById(inputId).value;
            if (!setName) return alert("Please enter a Set Name first!");
            showAIModal("✨ Analyzing the market for " + setName + "...");
            const advice = await callGemini(`Summarize the Pokémon TCG set "${setName}". Key chase cards, investment potential. Concise.`);
            updateAIModal(advice);
        }

        async function generatePortfolioInsights() {
            if (orders.length === 0) return alert("Add some pre-orders first!");
            showAIModal("✨ Analyzing your portfolio strategy...");
            const activeOrders = orders.filter(o => !o.archived);
            const portfolioData = activeOrders.map(o => `${o.qty}x ${o.name} (${o.set})`).join('\n');
            const insights = await callGemini(`Portfolio: ${portfolioData}. Provide 3 quick strategic tips.`, "You are a collectibles market analyst.");
            updateAIModal(insights);
        }

        function showAIModal(loadingText) {
            const modal = document.getElementById('ai-modal');
            const content = document.getElementById('ai-content');
            modal.style.display = 'flex';
            content.innerHTML = `<div class="space-y-4"><div class="h-4 shimmer rounded w-3/4"></div><div class="h-4 shimmer rounded w-full"></div><p class="text-indigo-400 font-bold animate-pulse text-xs uppercase mt-4">${loadingText}</p></div>`;
        }

        function updateAIModal(text) {
            const formatted = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            document.getElementById('ai-content').innerHTML = `<div class="fade-in">${formatted}</div>`;
        }

        function closeAIModal() { document.getElementById('ai-modal').style.display = 'none'; }

        // --- Memory & Suggestions Logic ---
        function getMemory() {
            const memory = { sets: new Set(), items: new Map(), merchants: new Set() };
            orders.forEach(o => {
                if (o.set) memory.sets.add(o.set);
                if (o.merchant) memory.merchants.add(o.merchant);
                if (o.name) memory.items.set(o.name, o.total);
            });
            return memory;
        }

        function handleInput(fieldId) {
            const input = document.getElementById(fieldId);
            const val = input.value.toLowerCase();
            const container = document.getElementById(`${fieldId}-suggestions`);
            const memory = getMemory();
            
            let list = [];
            if (fieldId.includes('setName')) list = Array.from(memory.sets);
            if (fieldId.includes('merchant')) list = Array.from(memory.merchants);
            if (fieldId.includes('itemName')) list = Array.from(memory.items.keys());

            const filtered = list.filter(item => item.toLowerCase().includes(val)).slice(0, 5);

            if (filtered.length > 0 && val.length > 0) {
                container.innerHTML = filtered.map(item => {
                    const price = fieldId.includes('itemName') ? memory.items.get(item) : null;
                    const safeItem = item.replace(/'/g, "\\'");
                    return `<div class="suggestion-item" onclick="selectSuggestion('${fieldId}', '${safeItem}', ${price})">
                        ${item} ${price ? `<span class="text-indigo-400 float-right">$${price}</span>` : ''}
                    </div>`;
                }).join('');
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function selectSuggestion(fieldId, value, price) {
            document.getElementById(fieldId).value = value;
            document.querySelectorAll('.suggestions-list').forEach(el => el.classList.add('hidden'));
            if (price && fieldId === 'itemName') {
                document.getElementById('totalPrice').value = price;
                handlePriceSync();
            }
        }

        // --- Form Logic ---
        function setPaymentType(type) {
            currentPaymentType = type;
            document.getElementById('pay-type-deposit').className = type === 'deposit' ? 'active' : '';
            document.getElementById('pay-type-full').className = type === 'full' ? 'active' : '';
            if (type === 'full') handlePriceSync();
        }

        function handlePriceSync() {
            if (currentPaymentType === 'full') {
                const unit = parseFloat(document.getElementById('totalPrice').value) || 0;
                const qty = parseFloat(document.getElementById('itemQty').value) || 1;
                document.getElementById('deposit').value = (unit * qty).toFixed(2);
            }
        }

        function handleSubmit() {
            const data = {
                id: Date.now(),
                name: document.getElementById('itemName').value,
                set: document.getElementById('setName').value,
                merchant: document.getElementById('merchant').value,
                date: document.getElementById('launchDate').value,
                total: parseFloat(document.getElementById('totalPrice').value) || 0,
                qty: parseInt(document.getElementById('itemQty').value) || 1,
                deposit: parseFloat(document.getElementById('deposit').value) || 0,
                archived: false
            };

            if (!data.name || !data.set || !data.merchant) return;

            const fileInput = document.getElementById('itemImage');
            const file = fileInput.files[0];
            
            const save = (imgData) => {
                if (imgData) data.img = imgData;
                const dupIdx = orders.findIndex(o => !o.archived && o.name === data.name && o.set === data.set && o.merchant === data.merchant);
                if (dupIdx !== -1) {
                    pendingOrder = { ...data, dupIdx };
                    document.getElementById('duplicate-modal').style.display = 'flex';
                } else {
                    orders.unshift(data);
                    finishSubmit();
                }
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => save(e.target.result);
                reader.readAsDataURL(file);
            } else {
                save(null);
            }
        }

        function finishSubmit() {
            document.getElementById('duplicate-modal').style.display = 'none';
            ['itemName', 'setName', 'merchant', 'totalPrice', 'deposit', 'launchDate', 'itemImage'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('itemQty').value = 1;
            saveAndRender();
        }

        // --- Inline Editing Logic ---
        function startInlineEdit(id) {
            editingId = id;
            renderDashboard();
        }

        function cancelInlineEdit() {
            editingId = null;
            renderDashboard();
        }

        function handleInlineUpdate(id, field, value) {
            const idx = orders.findIndex(o => o.id === id);
            if (idx === -1) return;
            if (field === 'total' || field === 'deposit') value = parseFloat(value) || 0;
            if (field === 'qty') value = parseInt(value) || 1;
            orders[idx][field] = value;
            calculateStats();
        }

        function saveInlineEdit(id) {
            editingId = null;
            saveAndRender();
        }

        function handleInlineImage(id, input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const idx = orders.findIndex(o => o.id === id);
                orders[idx].img = e.target.result;
                saveAndRender();
            };
            reader.readAsDataURL(file);
        }

        // --- Core App Logic ---
        function saveAndRender() {
            localStorage.setItem('pokeTracker_v2', JSON.stringify(orders));
            renderDashboard();
        }

        function toggleArchive(id, e) {
            e.stopPropagation();
            const idx = orders.findIndex(o => o.id === id);
            if (idx !== -1) {
                if (!orders[idx].archived) orders[idx].deposit = orders[idx].total * orders[idx].qty;
                orders[idx].archived = !orders[idx].archived;
                saveAndRender();
            }
        }

        function deleteOrder(id, e) {
            e.stopPropagation();
            orders = orders.filter(o => o.id !== id);
            saveAndRender();
        }

        function switchTab(tab) {
            currentTab = tab;
            renderDashboard();
        }

        function calculateStats() {
            let totalVal = 0, totalPaid = 0, totalBalance = 0;
            orders.forEach(o => {
                if (!o.archived) {
                    const rowTotal = o.total * o.qty;
                    totalVal += rowTotal;
                    totalPaid += o.deposit;
                    totalBalance += Math.max(0, rowTotal - o.deposit);
                }
            });
            document.getElementById('stat-total-val').innerText = `$${totalVal.toFixed(2)}`;
            document.getElementById('stat-paid').innerText = `$${totalPaid.toFixed(2)}`;
            document.getElementById('stat-balance').innerText = `$${totalBalance.toFixed(2)}`;
            document.getElementById('count-active').innerText = orders.filter(o => !o.archived).length;
            document.getElementById('count-archive').innerText = orders.filter(o => o.archived).length;
            
            const activeBtn = document.getElementById('tab-btn-active');
            const archiveBtn = document.getElementById('tab-btn-archive');
            if (currentTab === 'active') {
                activeBtn.className = "pb-3 text-sm font-bold uppercase tracking-widest border-b-2 border-indigo-500 text-white";
                archiveBtn.className = "pb-3 text-sm font-bold uppercase tracking-widest text-slate-500";
            } else {
                archiveBtn.className = "pb-3 text-sm font-bold uppercase tracking-widest border-b-2 border-indigo-500 text-white";
                activeBtn.className = "pb-3 text-sm font-bold uppercase tracking-widest text-slate-500";
            }
        }

        function renderDashboard() {
            calculateStats();
            const list = document.getElementById('orderList');
            
            // Sort logic: Next Due Date (Release Date)
            // If no date, put at end of list. 
            // In Archive tab, we can sort by release date descending (most recently collected/released)
            const sortedOrders = [...orders].sort((a, b) => {
                if (!a.date && !b.date) return 0;
                if (!a.date) return 1;
                if (!b.date) return -1;
                
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                
                if (currentTab === 'active') {
                    return dateA - dateB; // Soonest first
                } else {
                    return dateB - dateA; // Most recent first
                }
            });

            const filtered = sortedOrders.filter(o => currentTab === 'active' ? !o.archived : o.archived);

            list.innerHTML = filtered.map(o => {
                const isEditing = editingId === o.id;
                const fullTotal = o.total * o.qty;
                const bal = Math.max(0, fullTotal - o.deposit);
                const placeholder = `https://via.placeholder.com/100/1e293b/indigo?text=${o.name.charAt(0)}`;
                
                const daysLeft = getDaysUntil(o.date);
                let countdownHtml = '';
                if (daysLeft !== null && !o.archived) {
                    const color = daysLeft <= 7 ? 'bg-red-500/20 text-red-400' : daysLeft <= 14 ? 'bg-amber-500/20 text-amber-400' : 'bg-emerald-500/20 text-emerald-400';
                    const text = daysLeft < 0 ? 'Released' : daysLeft === 0 ? 'Today' : `${daysLeft}d left`;
                    countdownHtml = `<span class="countdown-badge ${color}">${text}</span>`;
                }

                if (isEditing) {
                    return `
                        <div class="glass-panel p-5 rounded-3xl edit-inline-card space-y-4">
                            <div class="flex justify-between items-center border-b border-white/5 pb-3">
                                <h4 class="text-xs font-bold uppercase text-slate-400 tracking-widest">Editing Entry</h4>
                                ${countdownHtml}
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div class="col-span-1 space-y-2">
                                    <div class="relative group aspect-square rounded-2xl bg-slate-800 overflow-hidden">
                                        <img src="${o.img || placeholder}" class="w-full h-full object-cover">
                                        <label class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-[10px] font-bold">CHANGE IMAGE<input type="file" class="hidden" onchange="handleInlineImage(${o.id}, this)"></label>
                                    </div>
                                    <button onclick="getSetAdvice('inline-set-${o.id}')" class="w-full py-2 bg-indigo-500/10 text-indigo-400 text-[10px] font-bold rounded-lg hover:bg-indigo-500/20">✨ ANALYZE SET</button>
                                </div>
                                <div class="col-span-3 grid grid-cols-2 gap-3">
                                    <div class="col-span-2 relative">
                                        <label class="block text-[8px] font-bold text-slate-500 uppercase ml-1">Product Set</label>
                                        <input type="text" id="inline-set-${o.id}" value="${o.set}" oninput="handleInlineUpdate(${o.id}, 'set', this.value); handleInput('inline-set-${o.id}')" class="w-full input-style p-2 rounded-xl text-xs">
                                        <div id="inline-set-${o.id}-suggestions" class="suggestions-list hidden no-scrollbar"></div>
                                    </div>
                                    <div class="col-span-2">
                                        <label class="block text-[8px] font-bold text-slate-500 uppercase ml-1">Item Name</label>
                                        <input type="text" value="${o.name}" oninput="handleInlineUpdate(${o.id}, 'name', this.value)" class="w-full input-style p-2 rounded-xl text-xs">
                                    </div>
                                    <div>
                                        <label class="block text-[8px] font-bold text-slate-500 uppercase ml-1">Merchant</label>
                                        <input type="text" value="${o.merchant}" oninput="handleInlineUpdate(${o.id}, 'merchant', this.value)" class="w-full input-style p-2 rounded-xl text-xs">
                                    </div>
                                    <div>
                                        <label class="block text-[8px] font-bold text-slate-500 uppercase ml-1">Launch</label>
                                        <input type="date" value="${o.date}" oninput="handleInlineUpdate(${o.id}, 'date', this.value)" class="w-full input-style p-2 rounded-xl text-xs">
                                    </div>
                                    <div>
                                        <label class="block text-[8px] font-bold text-slate-500 uppercase ml-1">Unit ($)</label>
                                        <input type="number" step="0.01" value="${o.total}" oninput="handleInlineUpdate(${o.id}, 'total', this.value)" class="w-full input-style p-2 rounded-xl text-xs font-bold text-indigo-400">
                                    </div>
                                    <div>
                                        <label class="block text-[8px] font-bold text-slate-500 uppercase ml-1">Qty</label>
                                        <input type="number" value="${o.qty}" oninput="handleInlineUpdate(${o.id}, 'qty', this.value)" class="w-full input-style p-2 rounded-xl text-xs font-bold">
                                    </div>
                                    <div class="col-span-1">
                                        <label class="block text-[8px] font-bold text-slate-500 uppercase ml-1">Paid ($)</label>
                                        <input type="number" step="0.01" value="${o.deposit}" oninput="handleInlineUpdate(${o.id}, 'deposit', this.value)" class="w-full input-style p-2 rounded-xl text-xs font-bold text-emerald-400">
                                    </div>
                                    <div class="flex items-end gap-2">
                                        <button onclick="saveInlineEdit(${o.id})" class="flex-1 bg-indigo-600 py-2.5 rounded-xl text-xs font-bold shadow-lg">Save</button>
                                        <button onclick="cancelInlineEdit()" class="px-3 py-2.5 bg-slate-800 text-slate-400 rounded-xl text-xs font-bold">✕</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div onclick="startInlineEdit(${o.id})" class="glass-panel p-4 rounded-3xl flex flex-col sm:flex-row items-center gap-4 cursor-pointer hover:border-indigo-500/30 transition-all ${o.archived ? 'opacity-60' : 'hover:scale-[1.01]'}">
                        <div class="flex items-center w-full sm:w-auto gap-4">
                            <img src="${o.img || placeholder}" class="image-preview-box flex-shrink-0">
                            <div class="overflow-hidden">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[8px] bg-indigo-500/20 text-indigo-300 font-bold px-1.5 py-0.5 rounded uppercase">${o.merchant}</span>
                                    ${countdownHtml}
                                </div>
                                <h4 class="text-white font-bold text-sm truncate">${o.name}</h4>
                                <p class="text-[10px] text-slate-500 truncate">${o.set} • ${o.date || 'TBD'}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 sm:flex items-center gap-6 w-full sm:w-auto sm:ml-auto">
                            <div class="text-center">
                                <span class="block text-[8px] text-slate-600 uppercase font-bold">Qty</span>
                                <span class="font-bold text-indigo-400 text-sm">${o.qty}</span>
                            </div>
                            <div class="text-center">
                                <span class="block text-[8px] text-slate-600 uppercase font-bold">Paid</span>
                                <span class="font-bold text-slate-300 text-sm">$${o.deposit.toFixed(2)}</span>
                            </div>
                            <div class="text-right min-w-[70px]">
                                <span class="block text-[8px] text-slate-600 uppercase font-bold">Due</span>
                                <span class="text-sm font-black ${bal <= 0 ? 'text-emerald-500' : 'text-white'}">$${bal.toFixed(2)}</span>
                            </div>
                        </div>

                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="event.stopPropagation(); toggleArchive(${o.id}, event)" class="flex-1 sm:flex-none px-4 py-2 rounded-xl bg-slate-800/50 text-slate-400 text-[10px] font-bold uppercase hover:bg-indigo-600 hover:text-white transition-all">
                                ${o.archived ? 'Restore' : 'Collect'}
                            </button>
                            <button onclick="deleteOrder(${o.id}, event)" class="p-2 text-slate-600 hover:text-red-500">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('btn-merge').onclick = () => {
            const idx = pendingOrder.dupIdx;
            orders[idx].qty += pendingOrder.qty;
            orders[idx].deposit += pendingOrder.deposit;
            finishSubmit();
        };

        document.getElementById('btn-cancel-merge').onclick = () => {
            orders.unshift(pendingOrder);
            finishSubmit();
        };

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                document.querySelectorAll('.suggestions-list').forEach(el => el.classList.add('hidden'));
            }
        });

        renderDashboard();
    </script>
</body>
</html>
